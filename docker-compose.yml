version: '3.9'

services:
  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
      - "5555:5555"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    mem_limit: 512m
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7070:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

  app:
    build: .
    # npx prisma migrate deploy aplica as migrations sem resetar o banco
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "8045:8045"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres-data:
  pgadmin-data: