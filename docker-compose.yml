version: '3.8'

services:
  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "5432:5432"
      - "5555:5555"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "7070:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin/

  app:
    build: .
    # npx prisma migrate deploy aplica as migrations sem resetar o banco
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "8045:8045"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

volumes:
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local